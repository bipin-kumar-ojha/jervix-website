<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#17222a"/>
      <stop offset="0.45" stop-color="#829096"/>
      <stop offset="1" stop-color="#f4f0dc"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1a271e"/>
      <stop offset="0.55" stop-color="#7f813c"/>
      <stop offset="1" stop-color="#c5a23d"/>
    </linearGradient>
    <radialGradient id="sun" cx="82%" cy="40%" r="36%">
      <stop offset="0" stop-color="#fff7c8" stop-opacity="0.82"/>
      <stop offset="0.45" stop-color="#f6d77b" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <circle cx="1265" cy="365" r="420" fill="url(#sun)">
    <animate attributeName="cx" values="1240;1280;1240" dur="10s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.42" filter="url(#soft)">
    <ellipse cx="760" cy="205" rx="150" ry="52" fill="#ffffff">
      <animateTransform attributeName="transform" type="translate" values="-40 0;80 0;-40 0" dur="18s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="1050" cy="165" rx="220" ry="62" fill="#ffffff">
      <animateTransform attributeName="transform" type="translate" values="90 0;-80 0;90 0" dur="21s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <path d="M0 560 C230 520 370 570 620 535 C900 495 1070 552 1600 500 L1600 900 L0 900 Z" fill="url(#ground)"/>
  <path d="M0 620 C240 575 450 625 690 590 C980 548 1160 604 1600 560 L1600 900 L0 900 Z" fill="#2a321b" opacity="0.38"/>

  <g opacity="0.34">
    <path d="M0 678 C220 635 370 690 610 650 C905 600 1080 680 1600 635" fill="none" stroke="#f4d65d" stroke-width="4">
      <animateTransform attributeName="transform" type="translate" values="-35 0;35 0;-35 0" dur="7s" repeatCount="indefinite"/>
    </path>
    <path d="M0 740 C260 695 450 750 720 705 C1020 655 1200 735 1600 692" fill="none" stroke="#fff2a7" stroke-width="3">
      <animateTransform attributeName="transform" type="translate" values="40 0;-45 0;40 0" dur="8s" repeatCount="indefinite"/>
    </path>
  </g>

  <g opacity="0.82">
    <ellipse cx="825" cy="790" rx="92" ry="20" fill="#10151b" opacity="0.34"/>
    <path d="M803 365 C790 410 790 475 804 540 L784 724 L820 724 L836 560 L855 724 L892 724 L866 540 C878 472 875 410 858 365 Z" fill="#1c2930"/>
    <circle cx="830" cy="312" r="42" fill="#26373f"/>
    <path d="M775 390 C690 430 614 450 548 442" fill="none" stroke="#1c2930" stroke-width="24" stroke-linecap="round">
      <animate attributeName="d" values="M775 390 C690 430 614 450 548 442;M775 390 C690 415 612 432 548 420;M775 390 C690 430 614 450 548 442" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M884 392 C970 430 1042 450 1110 440" fill="none" stroke="#1c2930" stroke-width="24" stroke-linecap="round">
      <animate attributeName="d" values="M884 392 C970 430 1042 450 1110 440;M884 392 C970 415 1044 432 1110 420;M884 392 C970 430 1042 450 1110 440" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M790 352 C824 392 854 392 885 350 L870 548 C848 566 810 566 790 548 Z" fill="#a93037"/>
  </g>

  <g opacity="0.5">
    <ellipse cx="1010" cy="806" rx="82" ry="20" fill="#10151b" opacity="0.32"/>
    <path d="M940 650 C984 595 1062 603 1090 665 C1130 708 1098 788 1020 793 C948 798 904 712 940 650 Z" fill="#3a3530">
      <animateTransform attributeName="transform" type="translate" values="-12 0;12 -3;-12 0" dur="4.8s" repeatCount="indefinite"/>
    </path>
    <circle cx="1003" cy="706" r="45" fill="#b9ad90"/>
